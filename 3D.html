<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Verticalidad Real</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
            perspective: 1000px; /* Esencial para que el 3D funcione */
        }

        .scene {
            width: 250px;
            height: 350px;
            transform-style: preserve-3d;
            /* Fijamos el origen en la base para que parezca "parada" en el piso del cel */
            transform-origin: bottom center; 
        }

        .floating-element {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600') center/cover;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            will-change: transform;
        }

        #permission-btn {
            position: fixed;
            bottom: 20px;
            padding: 15px 30px;
            z-index: 100;
            border-radius: 50px;
            border: none;
            background: #00e5ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="permission-btn">Activar Giroscopio</button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('permission-btn');

        function orientate(event) {
            let beta = event.beta;   // Inclinación adelante/atrás
            let gamma = event.gamma; // Inclinación lateral

            if (beta === null) return;

            // 1. Calculamos cuánto le falta al cel para estar vertical (90°)
            // Si el cel está a 60°, el ángulo de compensación es 30°.
            let angleToVertical = 90 - beta;

            // 2. TRUCO MAESTRO: Compensación de escala.
            // Para que no se vea "pequeña" al acostar el cel, calculamos la secante 
            // del ángulo (1/cos). Esto estira la imagen lo justo para cancelar 
            // la perspectiva del ojo.
            let rad = angleToVertical * (Math.PI / 180);
            let scaleY = 1 / Math.cos(rad);

            // Limitamos para evitar distorsiones infinitas cuando el cel está muy plano
            scaleY = Math.min(3, Math.max(1, scaleY));
            let rotationX = angleToVertical;

            // Movimiento lateral mínimo (casi nulo como pediste)
            let rotationY = gamma * 0.1;

            // Aplicamos: Rotamos para verticalizar y Escalamos para compensar el "achicamiento"
            hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) scaleY(${scaleY})`;
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const state = await DeviceOrientationEvent.requestPermission();
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', orientate);
                    btn.style.display = 'none';
                }
            } else {
                window.addEventListener('deviceorientation', orientate);
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
