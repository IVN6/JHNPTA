<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Holograma 3D</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #08080a;
            overflow: hidden;
            font-family: sans-serif;
            /* Perspectiva para el mundo 3D */
            perspective: 1000px;
        }

        .scene {
            width: 280px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinea la imagen al fondo del contenedor */
            transform-style: preserve-3d;

    /* ... lo que ya tenías ... */
    background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        

        .floating-element {
    width: 100%;
    height: 100%;
    /* Reemplaza la línea de background por esta: */
    background: url('https://static.vecteezy.com/system/resources/thumbnails/049/390/227/small_2x/strawberry-cake-with-cream-and-glaze-a-delicious-dessert-with-transparent-background-png.png') center/contain no-repeat;
    
    border-radius: 10px;
    /* Quité el shadow negro y puse uno más suave para que el pastel flote mejor */
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); 
    
    transform-origin: bottom center;
    will-change: transform;
    transition: transform 0.05s linear;
        }

        #btn {
            margin-top: 30px;
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="btn">Activar Verticalidad</button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('btn');

        function update(event) {
    let beta = event.beta;   
    let gamma = event.gamma; 

    if (beta === null || gamma === null) return;

    // 1. LÍMITES VERTICALES (Para que no se vea por detrás)
    // Forzamos a que el cálculo solo ocurra entre 20° y 90° de inclinación del cel
    // Así evitamos que la imagen se gire por completo.
    let constrainedBeta = Math.max(20, Math.min(90, beta));

    // 2. ROTACIÓN X (Verticalidad con tope)
    let rotationX = -(90 - constrainedBeta);

    // 3. COMPENSACIÓN DE ESCALA (Con tope para no deformar de más)
    let rad = (90 - constrainedBeta) * (Math.PI / 180);
    let scaleY = 1 / Math.cos(rad);
    scaleY = Math.min(2.0, scaleY); // No permitimos que se estire más del doble

    // 4. LÍMITES HORIZONTALES (Para que no dé la vuelta lateral)
    // Limitamos gamma a +/- 45 grados para que solo se mueva un poco a los lados
    let constrainedGamma = Math.max(-45, Math.min(45, gamma));
    let rotationY = -constrainedGamma * 0.5; // El 0.5 lo hace más sutil

    // Aplicamos la transformación
    hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) scaleY(${scaleY})`;
}

    </script>
</body>
</html>
