// Estados
function avanzarEstado(id) {
    const flujo = ['Pendiente', 'Preparando', 'Listo', 'Pagado'];
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido) return;
    const idx = flujo.indexOf(pedido.estado);
    if (idx < flujo.length - 1) {
        const siguiente = flujo[idx + 1];
        if (siguiente === 'Pagado') {
            elegirMetodoPagoYCobrar(id);
            return;
        }
        pedido.estado = siguiente;

        if (siguiente === 'Listo') {
            pedido.horaFin = Date.now();
        }

        pedido.estadoSincronizado = 'NO'; // se marca "SI" cuando Sheets confirme
        localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
        renderHistorial();
        sincronizarEstado(id, pedido.estado);
    }
}


function elegirMetodoPagoYCobrar(id) {
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido) return;
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;`;
    const metodos = [
        { k:'Efectivo', e:'💵' }, { k:'Nequi', e:'📱' },
        { k:'Daviplata', e:'🔵' }, { k:'Tarjeta', e:'💳' },
        { k:'Transferencia/PSE', e:'🏦' }, { k:'Llave', e:'🔑' }
    ];
    overlay.innerHTML = `
    <div style="background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;">
        <div style="font-weight:700;font-size:1rem;margin-bottom:4px;">💵 ¿Cómo paga la mesa ${pedido.mesa}?</div>
        <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:14px;">Total: <strong>${formatPeso(pedido.total)}</strong></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
            ${metodos.map(m => `
            <button onclick="confirmarCobro('${id}','${m.k}',this.parentElement.parentElement.parentElement)"
                style="padding:12px 6px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:0.85rem;font-weight:600;">
                ${m.e}<br>${m.k}
            </button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
            <input id="otro-pago-input" type="text" placeholder="Otro método..."
                style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;outline:none;">
            <button onclick="confirmarCobro('${id}',document.getElementById('otro-pago-input').value||'Otro',this.parentElement.parentElement.parentElement)"
                style="padding:10px 14px;background:var(--primary);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">OK</button>
        </div>
        <button onclick="this.parentElement.parentElement.remove()"
            style="width:100%;padding:10px;background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--text-muted);cursor:pointer;font-size:0.9rem;margin-top:10px;">Cancelar</button>
    </div>`;
    document.body.appendChild(overlay);
}

function confirmarCobro(id, metodoPago, overlay) {
    overlay.remove();
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido || !metodoPago.trim()) return;
    pedido.estado = 'Pagado';
    pedido.metodoPago = metodoPago;
    pedido.detallePago = '';

    if (!pedido.horaFin) {
        pedido.horaFin = Date.now();
    }

    pedido.estadoSincronizado = 'NO'; // se marca "SI" cuando Sheets confirme
    localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
    renderHistorial();
    sincronizarEstado(id, 'Pagado');
    showToast(`✅ Cobrado con ${metodoPago}`);
}


function regresarEstado(id) {
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido) return;
    pedido.estado = 'Pendiente';
    pedido.estadoSincronizado = 'NO';
    localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
    renderHistorial();
    sincronizarEstado(id, 'Pendiente');
}

async function sincronizarEstado(id, estado) {
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido || pedido.sincronizado === 'NO') return;
    try {
        const payload = { accion: "cambiarEstado", id: pedido.id, estado, codigo: miCodigo, local: pedido.local };
        if (pedido.metodoPago) payload.metodoPago = pedido.metodoPago;
        if (pedido.horaFin)    payload.horaFin    = pedido.horaFin;

        const res = await fetch(API_URL, { method: "POST", redirect: "follow",
            body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.ok) {
            pedido.estadoSincronizado = 'SI';
            localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
        } else {
            console.warn("Estado no actualizado en Sheets:", data.error);
            showToast(`⚠️ ${data.error || 'No autorizado'}`);
        }
    } catch { /* offline: sincronizarEstadosPendientes() reintentará */ }
}

async function sincronizarEstadosPendientes() {
    const pendientes = historialPedidos.filter(p =>
        p.estadoSincronizado !== 'SI' && p.sincronizado === 'SI' && !p.enviando
    );
    for (const pedido of pendientes) {
        await sincronizarEstado(pedido.id, pedido.estado);
    }
}

// Archivar
async function archivarPedido(id) {
    if (!confirm("¿Archivar este pedido? Desaparecerá del monitor (queda en Sheets).")) return;
    const pedido = historialPedidos.find(p => p.id === id);
    const localPedido = pedido ? pedido.local : miLocal;
    historialPedidos = historialPedidos.filter(p => p.id !== id);
    localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
    renderHistorial();
    try {
        await fetch(API_URL, { method: "POST", redirect: "follow",
            body: JSON.stringify({ accion: "archivarPedido", id, codigo: miCodigo, local: localPedido }) });
    } catch { /* offline OK */ }
}

// Reabrir para editar
function reabrirParaEditar(id) {
    const pedido = historialPedidos.find(p => p.id === id);
    if (!pedido) return;
    if (comandaActiva.length > 0 && !confirm("Tienes ítems en la comanda actual. ¿Unificar?")) return;

    if (Array.isArray(pedido.itemsRaw) && pedido.itemsRaw.length > 0) {
        comandaActiva = JSON.parse(JSON.stringify(pedido.itemsRaw));
    } else {
        // Solo pasa con pedidos muy antiguos, de antes de guardar itemsRaw.
        comandaActiva = [];
        pedido.items.split(', ').forEach(parte => {
            const m = parte.match(/^(\d+)x ([^\[]+)/);
            if (m) {
                const cantidad = parseInt(m[1]);
                const nombre = m[2].trim();
                const prod = listaProductos.find(p => p.nombre.toLowerCase() === nombre.toLowerCase());
                if (prod) comandaActiva.push({ ...prod, cantidad, specs:'', notaItem:'', precioFinal: prod.precio });
            }
        });
    }

    document.getElementById('num-mesa').value = pedido.mesa || '';
    document.getElementById('campo-mesero').value = pedido.mesero || '';
    document.getElementById('comentario-orden').value = pedido.notas || '';

    window._pedidoEditandoId = pedido.id;
    window._pedidoEditandoVersion = pedido.version || 1;

    guardarYRender();
    showToast("✏️ Comanda abierta para editar.");
    if (window.innerWidth < 768) switchView('view-comanda', document.getElementById('btn-tab-comanda'));
}

function construirVistaItems(pedido) {
    if (Array.isArray(pedido.eventos) && pedido.eventos.length > 0) {
        const porLinea = {};
        [...pedido.eventos].sort((a, b) => a.ts - b.ts).forEach(ev => {
            if (ev.tipo === 'item_agregado' && ev.item?.lineId) {
                porLinea[ev.item.lineId] = { item: { ...ev.item }, eliminado: false, agregadoTs: ev.ts };
            } else if (ev.tipo === 'item_modificado' && ev.item?.lineId && porLinea[ev.item.lineId]) {
                porLinea[ev.item.lineId].item = { ...ev.item };
            } else if (ev.tipo === 'item_eliminado' && ev.lineId && porLinea[ev.lineId]) {
                porLinea[ev.lineId].eliminado = true;
            } else if (ev.tipo === 'item_listo' && ev.lineId && porLinea[ev.lineId]) {
                porLinea[ev.lineId].item.listo = !!ev.listo;
            }
        });
        return Object.values(porLinea).map(x => {
            const esNuevo = x.agregadoTs > (pedido.creadoEn || 0) + 2000;
            let estilo = '';
            if (x.eliminado) estilo = 'text-decoration:line-through; opacity:0.45;';
            else if (esNuevo) estilo = 'color:var(--primary); font-weight:700;';
            const it = x.item;
            let linea = `${it.cantidad}x ${it.nombre}`;
            if (it.specs) linea += ` [${it.specs}]`;
            if (it.notaItem) linea += ` (${it.notaItem})`;
            return { html: linea, estilo, eliminado: x.eliminado, lineId: it.lineId, listo: !!it.listo };
        });
    }
    // Fallback para pedidos muy antiguos, sin historial de eventos aún.
    return pedido.items.split(', ').filter(Boolean).map(it => ({ html: it, estilo: '', eliminado: false, lineId: null, listo: false }));
}


// ── sync.js ──
// ═══════════════════════════════════════════════════════════
//  SINCRONIZACIÓN CON SHEETS
// ═══════════════════════════════════════════════════════════
async function sincronizarPendientes() {
    const pendientes = historialPedidos.filter(p => p.sincronizado === "NO" && !p.enviando);
    for (const pedido of pendientes) {
        pedido.enviando = true;
        try {
            const res = await fetch(API_URL, {
                method: "POST", redirect: "follow",
                body: JSON.stringify({
                    accion: "nuevoPedido",
                    id: pedido.id,
                    codigo: miCodigo,
                    mesa: pedido.mesa, mesero: pedido.mesero,
                    total: pedido.total, items: pedido.items,
                    itemsRaw: JSON.stringify(pedido.itemsRaw || []),
                    notas: pedido.notas, metodoPago: pedido.metodoPago,
                    local: pedido.local
                })
            });
            const data = await res.json();
            if (data.ok) {
                pedido.sincronizado = "SI";
                if (data.numeroPedido) pedido.numeroPedido = data.numeroPedido;
                localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
            }
        } catch {
            pedido.enviando = false;
            break;
        }
        pedido.enviando = false;
    }
}

async function cargarPedidos() {
    if (window._cargandoPedidos) return;
    window._cargandoPedidos = true;
    try {
        await sincronizarPendientes();
        await sincronizarEventosPendientes();
        await sincronizarEstadosPendientes();

        const res = await fetch(`${API_URL}?accion=obtenerPedidos&codigo=${encodeURIComponent(miCodigo)}&local=${encodeURIComponent(miLocal)}`);
        const data = await res.json();
        if (data.ok) {
            const noSync = historialPedidos.filter(p => p.sincronizado === "NO");
            const idsLocalesPendientes = new Set(noSync.map(p => p.id));
            const deLaNube = data.pedidos.filter(p =>
    !idsLocalesPendientes.has(p.id) && String(p.local || '1') === String(miLocal)
);

            deLaNube.forEach(p => {
                const localMatch = historialPedidos.find(lp => String(lp.id) === String(p.id));

                if (!p.horaLocal && p.hora) p.horaLocal = p.hora;
                p.sincronizado = "SI";

                if (typeof p.itemsRaw === 'string' && p.itemsRaw) {
                    try { p.itemsRaw = JSON.parse(p.itemsRaw); } catch { p.itemsRaw = []; }
                } else if (!Array.isArray(p.itemsRaw)) {
                    p.itemsRaw = [];
                }

                p.creadoEn = p.creadoEn || (localMatch && localMatch.creadoEn) || reconstruirInicioDesdeFechaHora(p) || Date.now();

                const localPendiente = localMatch && localMatch.estadoSincronizado && localMatch.estadoSincronizado !== 'SI';
                const itemsPendientes = localMatch && localMatch.eventosPendientes && localMatch.eventosPendientes.length > 0;

                if (localPendiente) {
                    if (localMatch.metodoPago) p.metodoPago = localMatch.metodoPago;
                    if (localMatch.horaFin)    p.horaFin    = localMatch.horaFin;
                    if (localMatch.estado)     p.estado     = localMatch.estado;
                }
                if (itemsPendientes) {
                    // Hay ediciones que el servidor aún no confirma: NUNCA se
                    // pisan con lo que venga de la nube. Esto es justo lo que
                    // faltaba y causaba la pérdida de ítems.
                    p.itemsRaw = localMatch.itemsRaw;
                    p.items = localMatch.items;
                    p.total = localMatch.total;
                    p.mesa = localMatch.mesa; p.mesero = localMatch.mesero; p.notas = localMatch.notas;
                    p.eventosPendientes = localMatch.eventosPendientes;
                    p.eventos = localMatch.eventos || p.eventos;
                }

                p.estadoSincronizado = localPendiente ? localMatch.estadoSincronizado : 'SI';
                p.itemsSincronizado = itemsPendientes ? 'NO' : 'SI';
            });

            historialPedidos = [...noSync, ...deLaNube].sort((a, b) => (a.creadoEn || 0) - (b.creadoEn || 0));
            localStorage.setItem('historialPedidos', JSON.stringify(historialPedidos));
            renderHistorial();
        }
    } catch (error) {
        console.error("Error cargando pedidos, usando modo offline:", error);
        renderHistorial();
    } finally {
        window._cargandoPedidos = false;
    }
}

function iniciarPolling() {
    if (pollingTimer) clearInterval(pollingTimer);
    pollingTimer = setInterval(() => {
        cargarPedidos();
    }, POLLING_MS);
}


// ── admin.js ──
function obtenerResumenDia() {
    const pagados = historialPedidos.filter(p => p.estado === 'Pagado');
    const pendientes = historialPedidos.filter(p => p.estado !== 'Pagado');
    const totalVendido = pagados.reduce((s, p) => s + Number(p.total || 0), 0);
    const totalPendiente = pendientes.reduce((s, p) => s + Number(p.total || 0), 0);
    const porMetodo = {};
    const topItems = {};

    historialPedidos.forEach(pedido => {
        const metodo = pedido.metodoPago || pedido.detallePago || 'Efectivo';
        porMetodo[metodo] = (porMetodo[metodo] || 0) + Number(pedido.total || 0);

        const items = Array.isArray(pedido.itemsRaw) && pedido.itemsRaw.length
            ? pedido.itemsRaw
            : (pedido.items || '').split(',').map(x => x.trim()).filter(Boolean);

        items.forEach(item => {
            let nombre = '';
            let cantidad = 1;

            if (typeof item === 'string') {
                const match = item.match(/^(\d+)x\s*(.+)$/i);
                if (match) {
                    cantidad = Number(match[1]) || 1;
                    nombre = match[2].replace(/\s*\[.*?\]/g, '').replace(/\s*\(.*?\)/g, '').trim();
                } else {
                    nombre = item.replace(/\s*\[.*?\]/g, '').replace(/\s*\(.*?\)/g, '').trim();
                }
            } else if (item && item.nombre) {
                nombre = item.nombre;
                cantidad = Number(item.cantidad) || 1;
            }

            if (nombre) {
                topItems[nombre] = (topItems[nombre] || 0) + cantidad;
            }
        });
    });

    const topProductos = Object.entries(topItems)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

    return {
        totalComandas: historialPedidos.length,
        pagadas: pagados.length,
        pendientes: pendientes.length,
        totalVendido,
        totalPendiente,
        promedioPorComanda: historialPedidos.length ? Math.round(totalVendido / historialPedidos.length) : 0,
        metodos: Object.entries(porMetodo).sort((a, b) => b[1] - a[1]),
        topProductos
    };
}

function verResumenDia() {
    const clave = prompt('Clave de administrador:');
    if (clave !== '1234') {
        showToast('❌ Clave incorrecta.');
        return;
    }

    const resumen = obtenerResumenDia();
    const metodosHtml = resumen.metodos.length
        ? resumen.metodos.map(([metodo, valor]) => `
            <div class="summary-item">
                <span>${metodo}</span>
                <span class="muted">${formatPeso(valor)}</span>
            </div>`).join('')
        : '<div class="summary-empty">Sin pagos registrados</div>';

    const topHtml = resumen.topProductos.length
        ? resumen.topProductos.map(([nombre, cantidad]) => `
            <div class="summary-item">
                <span>${nombre}</span>
                <span class="muted">${cantidad} und</span>
            </div>`).join('')
        : '<div class="summary-empty">Aún no hay productos vendidos</div>';

    document.getElementById('summary-content').innerHTML = `
        <div class="summary-stat-grid">
            <div class="summary-stat-card positive">
                <div class="summary-label">Comandas</div>
                <div class="summary-value">${resumen.totalComandas}</div>
            </div>
            <div class="summary-stat-card positive">
                <div class="summary-label">Pagadas</div>
                <div class="summary-value">${resumen.pagadas}</div>
            </div>
            <div class="summary-stat-card warning">
                <div class="summary-label">Pendientes</div>
                <div class="summary-value">${resumen.pendientes}</div>
            </div>
        </div>
        <div class="summary-section">
            <div class="summary-section-title">Totales</div>
            <div class="summary-list">
                <div class="summary-item"><span>Venta cerrada</span><span class="muted">${formatPeso(resumen.totalVendido)}</span></div>
                <div class="summary-item"><span>Pendiente por cobrar</span><span class="muted">${formatPeso(resumen.totalPendiente)}</span></div>
                <div class="summary-item"><span>Promedio por comanda</span><span class="muted">${formatPeso(resumen.promedioPorComanda)}</span></div>
            </div>
        </div>
        <div class="summary-section">
            <div class="summary-section-title">Métodos de pago</div>
            <div class="summary-list">${metodosHtml}</div>
        </div>
        <div class="summary-section">
            <div class="summary-section-title">Productos más pedidos</div>
            <div class="summary-list">${topHtml}</div>
        </div>`;

    document.getElementById('summary-overlay').classList.add('open');
}

function cerrarResumenDia(event) {
    if (event.target && event.target.id === 'summary-overlay') {
        cerrarResumenDiaBtn();
    }
}

function cerrarResumenDiaBtn() {
    document.getElementById('summary-overlay').classList.remove('open');
}
