<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vertical Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
            /* Perspectiva amplia para que el estiramiento sea visible */
            perspective: 800px; 
        }

        .scene {
            width: 280px;
            height: 400px;
            transform-style: preserve-3d;
            /* FIJAMOS EL ANCLA EN LA BASE: 
               Esto hace que la imagen "crezca" hacia arriba */
            transform-origin: bottom center; 
        }

        .floating-element {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600') center/cover;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            will-change: transform;
        }

        #permission-btn {
            position: fixed;
            top: 20px;
            padding: 12px 24px;
            z-index: 100;
            border-radius: 10px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="permission-btn">Activar Efecto</button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('permission-btn');

        function orientate(event) {
            let beta = event.beta;   // Inclinación frente/atrás
            let gamma = event.gamma; // Inclinación lateral

            if (beta === null) return;

            // 1. ELIMINAMOS EL OFFSET: 
            // Si el usuario sostiene el cel a 70°, queremos que a partir de ahí 
            // la imagen esté vertical.
            const userAngle = 70; 
            let diff = beta - userAngle;

            // 2. ROTACIÓN INVERSA:
            // Si el cel baja (beta aumenta), la imagen debe rotar hacia ADELANTE
            // para mantenerse vertical. En CSS, rotar hacia adelante es negativo en X.
            let rotationX = -diff;

            // 3. COMPENSACIÓN DE ESTIRAMIENTO (Anamorfosis):
            // Si el cel se acuesta, la imagen se proyecta más corta al ojo.
            // La escala debe aumentar para compensar esa pérdida de altura visual.
            // Usamos el valor absoluto para que siempre estire al alejarse del ángulo base.
            let stretch = 1 + (Math.abs(diff) / 60); 

            // 4. MOVIMIENTO LATERAL COMPENSADO:
            // Para que no se mueva "con" el cel, sino que parezca quieta,
            // rotamos en Y el valor inverso de gamma.
            let rotationY = -gamma * 0.8; 

            // Aplicamos la transformación
            // Nota: scaleY(stretch) hará que la parte superior crezca porque el origen es 'bottom'
            hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) scaleY(${stretch})`;
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const state = await DeviceOrientationEvent.requestPermission();
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', orientate);
                    btn.style.display = 'none';
                }
            } else {
                window.addEventListener('deviceorientation', orientate);
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
