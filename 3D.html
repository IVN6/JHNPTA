<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Holograma 3D</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #08080a;
            overflow: hidden;
            font-family: sans-serif;
            /* Perspectiva para el mundo 3D */
            perspective: 1000px;
        }

        .scene {
            width: 280px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinea la imagen al fondo del contenedor */
            transform-style: preserve-3d;
        }

        .floating-element {
    width: 100%;
    height: 100%;
    /* Reemplaza la línea de background por esta: */
    background: url('https://static.vecteezy.com/system/resources/thumbnails/049/390/227/small_2x/strawberry-cake-with-cream-and-glaze-a-delicious-dessert-with-transparent-background-png') center/contain no-repeat;
    
    border-radius: 10px;
    /* Quité el shadow negro y puse uno más suave para que el pastel flote mejor */
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); 
    
    transform-origin: bottom center;
    will-change: transform;
    transition: transform 0.05s linear;
        }

        #btn {
            margin-top: 30px;
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="btn">Activar Verticalidad</button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('btn');

        function update(event) {
            let beta = event.beta;   // Inclinación adelante/atrás (0 plano, 90 vertical)
            let gamma = event.gamma; // Inclinación lateral

            if (beta === null) return;

            // 1. CÁLCULO DE ROTACIÓN X (Verticalidad)
            // Queremos que la imagen esté a 90° del suelo.
            // Si el cel está a 60°, la imagen debe rotar 30° hacia adelante.
            // La fórmula es: Inclinación_Imagen = -(90 - beta)
            let rotationX = -(90 - beta);

            // 2. CÁLCULO DE ESCALA (Compensación visual)
            // Cuando el cel se acuesta, el ojo ve la imagen más corta.
            // Usamos la secante (1/coseno) para estirarla lo justo.
            let rad = (90 - beta) * (Math.PI / 180);
            let scaleY = 1 / Math.cos(rad);

            // Limitamos la escala para que no se rompa si el cel está totalmente plano
            scaleY = Math.min(2.5, Math.max(1, scaleY));

            // 3. ROTACIÓN Y (Lateral)
            // Para que parezca estática, rotamos inversamente al movimiento del cel.
            let rotationY = -gamma;

            // Aplicamos la transformación:
            // Primero rotamos en la bisagra y luego escalamos para mantener el tamaño visual
            hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) scaleY(${scaleY})`;
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const result = await DeviceOrientationEvent.requestPermission();
                if (result === 'granted') {
                    window.addEventListener('deviceorientation', update);
                    btn.style.display = 'none';
                }
            } else {
                window.addEventListener('deviceorientation', update);
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
