<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto 3D Vertical</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            overflow: hidden;
            font-family: sans-serif;
            /* Perspectiva profunda para acentuar el efecto 3D */
            perspective: 1000px; 
        }

        .scene {
            width: 300px;
            height: 400px;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-element {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600') center/cover;
            border-radius: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            
            /* Eliminamos el translateZ estático para controlarlo por JS */
            will-change: transform;
            transition: transform 0.05s linear; 
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="permission-btn" style="position:fixed; bottom:20px; z-index:100; padding:12px 24px; border-radius:20px; border:none; background:#fff; font-weight:bold;">
        Activar Sensor
    </button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('permission-btn');

        function orientate(event) {
            let beta = event.beta;   // Inclinación adelante/atrás (0 a 180)
            let gamma = event.gamma; // Inclinación lateral (-90 a 90)

            if (beta === null || gamma === null) return;

            /* LÓGICA DE COMPENSACIÓN:
               Si el objetivo es que la imagen esté siempre a 90° respecto al suelo:
               La rotación necesaria es (90 - beta).
               Si el cel está a 90° (vertical), la rotación es 0 (paralelo al cel).
               Si el cel está a 45°, la imagen rota 45° hacia adelante para compensar.
            */
            let rotationX = 90 - beta;

            // Reducimos el movimiento lateral (gamma) al 20% para que sea casi imperceptible
            // como pediste, pero que mantenga un toque de profundidad.
            let rotationY = gamma * 0.2; 

            // Aplicamos los límites para evitar que la imagen se deforma de forma absurda
            rotationX = Math.max(-70, Math.min(70, rotationX));

            // El translateZ(50px) hace que la imagen "flote" un poco sobre el cristal
            hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) translateZ(50px)`;
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const state = await DeviceOrientationEvent.requestPermission();
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', orientate);
                    btn.style.display = 'none';
                }
            } else {
                window.addEventListener('deviceorientation', orientate);
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
