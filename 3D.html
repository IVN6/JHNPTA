<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Pastel 3D - Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0c;
            overflow: hidden;
            font-family: sans-serif;
            /* Perspectiva para el mundo 3D */
            perspective: 1200px;
        }

        .scene {
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            transform-style: preserve-3d;
        }

        .floating-element {
            width: 100%;
            height: 100%;
            /* Imagen del pastel con fondo transparente */
            background: url('https://static.vecteezy.com/system/resources/thumbnails/049/390/227/small_2x/strawberry-cake-with-cream-and-glaze-a-delicious-dessert-with-transparent-background-png') center/contain no-repeat;
            
            /* Sombra que sigue la forma del pastel */
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            
            /* El eje de giro es la base (la bisagra) */
            transform-origin: bottom center;
            
            will-change: transform;
            /* Transición lineal muy rápida para que no tenga lag */
            transition: transform 0.05s linear;
        }

        #btn {
            position: fixed;
            bottom: 40px;
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            background: #ffffff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="floating-element" id="hologram"></div>
    </div>

    <button id="btn">Activar Efecto 3D</button>

    <script>
        const hologram = document.getElementById('hologram');
        const btn = document.getElementById('btn');

        function update(event) {
            let beta = event.beta;   // Adelante/Atrás (rango 0 a 180)
            let gamma = event.gamma; // Lateral (rango -90 a 90)

            if (beta === null || gamma === null) return;

            // 1. DEFINIR EL ÁNGULO DE REPOSO
            // Consideramos que el usuario sostiene el cel normalmente a 70 grados.
            const baseAngle = 70;
            let diff = beta - baseAngle;

            // 2. LÍMITES VERTICALES (Clamping)
            // Evitamos que la rotación sea excesiva para que no se vea "plano" o al revés.
            let rotationX = -diff; 
            rotationX = Math.max(-60, Math.min(60, rotationX));

            // 3. COMPENSACIÓN ANAMÓRFICA (Stretch)
            // Calculamos cuánto estirar la imagen para que no parezca aplastada al inclinar.
            let rad = (diff * 0.8) * (Math.PI / 180);
            let scaleY = 1 / Math.cos(rad);
            // Cap de estiramiento máximo de 2.5 para que no se deforme feo
            scaleY = Math.min(2.5, Math.max(1, scaleY));

            // 4. LÍMITES HORIZONTALES
            // Amortiguamos gamma para que el giro lateral sea sutil y no muestre la espalda.
            let rotationY = -gamma * 0.5;
            rotationY = Math.max(-40, Math.min(40, rotationY));

            // Aplicamos la transformación final
            hologram.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg) scaleY(${scaleY})`;
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const result = await DeviceOrientationEvent.requestPermission();
                    if (result === 'granted') {
                        window.addEventListener('deviceorientation', update);
                        btn.style.display = 'none';
                    }
                } catch (e) { alert("Error al activar sensores"); }
            } else {
                window.addEventListener('deviceorientation', update);
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
